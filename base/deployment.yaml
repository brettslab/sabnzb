apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sabnzbd
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      initContainers:
        - name: prepare-incomplete
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:3000 /data/downloads/incomplete && chmod -R u+rwX,g+rwX /data/downloads/incomplete"]
          volumeMounts:
            - name: incomplete
              mountPath: /data/downloads/incomplete
      containers:
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:v3
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - "(ip rule del table 51820; ip -6 rule del table 51820) || true"
          envFrom:
            - configMapRef:
                name: sabnzbd-gluetun-config
            - secretRef:
                name: sabnzbd-gluetun-windscribe
          ports:
            - name: vpn-control
              containerPort: 8000
              protocol: TCP
            - name: vpn-health
              containerPort: 9999
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: vpn-health
            initialDelaySeconds: 15
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: vpn-health
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
        - name: sabnzbd
          image: lscr.io/linuxserver/sabnzbd:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "3000"
            - name: TZ
              value: Australia/Brisbane
          envFrom:
            - secretRef:
                name: sabnzbd-news-server
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /data/downloads
            - name: incomplete
              mountPath: /data/downloads/incomplete
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sabnzbd-config
        - name: downloads
          persistentVolumeClaim:
            claimName: media-downloads
        - name: incomplete
          persistentVolumeClaim:
            claimName: sabnzbd-incomplete
